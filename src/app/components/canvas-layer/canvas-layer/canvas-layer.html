<svg class="canvas-svg">
      <g [attr.transform]="getTransform()">
        <path
          *ngFor="let path of paths$ | async; trackBy: trackByPathId"
          
          [attr.id]="'path-' + path.id" 
          [attr.d]="path.d"
          [attr.stroke]="path.color"
          [attr.stroke-width]="path.width"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"

          (pointerdown)="onPathClick($event, path)" 
        />
      </g>
    </svg>
  `
